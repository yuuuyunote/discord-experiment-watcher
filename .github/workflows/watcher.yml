name: Discord Experiments Watcher

on:
  schedule:
    - cron: '*/30 * * * *' # 30分ごとに自動実行
  workflow_dispatch: # 手動実行用ボタンを有効化

jobs:
  watch:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: |
        npm install axios

    # ======= 【今だけ一時的に書き換えているエリア】 =======
    # プログラムを実行せず、直接ファイルを最新状態に強制同期します
    - name: Force Sync Experiments
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: |
        curl -s https://raw.githubusercontent.com/xHyroM/discord-datamining/master/data/client/experiments/experiments.json | grep -oE '[0-9]{4}-[0-9]{2}_[a-zA-Z0-9_]+' | sort -u | jq -R . | jq -s . > last_experiments.json
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add last_experiments.json
        git commit -m "chore: force sync experiments list" || exit 0
        git push
    # ====================================================
